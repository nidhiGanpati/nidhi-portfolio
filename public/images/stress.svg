<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#080810"/>
  <text x="40" y="45" font-family="monospace" font-size="18" fill="#a855f7" font-weight="bold">Stress Detection System</text>
  <text x="40" y="65" font-family="monospace" font-size="10" fill="#ffffff40">Python · TensorFlow · Flask · 94% Accuracy</text>
  <!-- EEG-style wave -->
  <path d="M40,160 Q80,100 120,160 Q160,220 200,160 Q240,100 260,80 Q280,60 300,160 Q320,260 360,160 Q400,60 420,160 Q440,260 480,160 Q520,60 560,160 Q600,260 640,160 Q680,60 760,160" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <!-- Model accuracy cards -->
  <rect x="40" y="200" width="160" height="80" rx="10" fill="#0d1020"/>
  <text x="120" y="225" font-family="monospace" font-size="10" fill="#ffffff60" text-anchor="middle">Random Forest</text>
  <text x="120" y="255" font-family="monospace" font-size="24" fill="#22c55e" text-anchor="middle" font-weight="bold">91%</text>
  <rect x="215" y="200" width="160" height="80" rx="10" fill="#0d1020"/>
  <text x="295" y="225" font-family="monospace" font-size="10" fill="#ffffff60" text-anchor="middle">SVM</text>
  <text x="295" y="255" font-family="monospace" font-size="24" fill="#a855f7" text-anchor="middle" font-weight="bold">93%</text>
  <rect x="390" y="200" width="160" height="80" rx="10" fill="#0d1020"/>
  <text x="470" y="225" font-family="monospace" font-size="10" fill="#ffffff60" text-anchor="middle">Neural Net</text>
  <text x="470" y="255" font-family="monospace" font-size="24" fill="#a855f7" text-anchor="middle" font-weight="bold">94%</text>
  <!-- Prediction result -->
  <rect x="40" y="300" width="720" height="120" rx="14" fill="#0d1020"/>
  <text x="60" y="328" font-family="monospace" font-size="12" fill="#ffffff80">Flask Live Prediction</text>
  <rect x="60" y="340" width="200" height="65" rx="8" fill="#7c3aed15" stroke="#7c3aed30"/>
  <text x="160" y="365" font-family="monospace" font-size="10" fill="#ffffff60" text-anchor="middle">Input Features</text>
  <text x="160" y="383" font-family="monospace" font-size="10" fill="#ffffff60" text-anchor="middle">HRV · EDA · Sleep</text>
  <text x="160" y="397" font-family="monospace" font-size="10" fill="#ffffff60" text-anchor="middle">Activity · Temp</text>
  <text x="340" y="374" font-family="monospace" font-size="18" fill="#a855f7" text-anchor="middle">→</text>
  <rect x="390" y="340" width="160" height="65" rx="8" fill="#22c55e20" stroke="#22c55e30"/>
  <text x="470" y="366" font-family="monospace" font-size="10" fill="#22c55e" text-anchor="middle">Stress Level</text>
  <text x="470" y="388" font-family="monospace" font-size="18" fill="#22c55e" text-anchor="middle" font-weight="bold">LOW</text>
  <rect x="580" y="340" width="160" height="65" rx="8" fill="#7c3aed15" stroke="#7c3aed30"/>
  <text x="660" y="366" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">Confidence</text>
  <text x="660" y="388" font-family="monospace" font-size="18" fill="#a855f7" text-anchor="middle" font-weight="bold">94.2%</text>
</svg>
