<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f"/>
      <stop offset="100%" style="stop-color:#0e0a1e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <!-- Nodes and connections -->
  <line x1="120" y1="225" x2="400" y2="150" stroke="#7c3aed40" stroke-width="2"/>
  <line x1="120" y1="225" x2="400" y2="225" stroke="#7c3aed40" stroke-width="2"/>
  <line x1="120" y1="225" x2="400" y2="300" stroke="#7c3aed40" stroke-width="2"/>
  <line x1="400" y1="150" x2="680" y2="120" stroke="#a855f740" stroke-width="2"/>
  <line x1="400" y1="150" x2="680" y2="180" stroke="#a855f740" stroke-width="2"/>
  <line x1="400" y1="225" x2="680" y2="225" stroke="#a855f740" stroke-width="2"/>
  <line x1="400" y1="300" x2="680" y2="270" stroke="#a855f740" stroke-width="2"/>
  <line x1="400" y1="300" x2="680" y2="330" stroke="#a855f740" stroke-width="2"/>
  <!-- Source node -->
  <circle cx="120" cy="225" r="36" fill="#7c3aed20" stroke="#7c3aed" stroke-width="2"/>
  <text x="120" y="220" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">API</text>
  <text x="120" y="233" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Gateway</text>
  <!-- Middle nodes -->
  <circle cx="400" cy="150" r="28" fill="#1a0a2e" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="154" font-family="monospace" font-size="9" fill="#e2d0ff" text-anchor="middle">Rabbit</text>
  <circle cx="400" cy="225" r="28" fill="#1a0a2e" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="229" font-family="monospace" font-size="9" fill="#e2d0ff" text-anchor="middle">Redis</text>
  <circle cx="400" cy="300" r="28" fill="#1a0a2e" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="304" font-family="monospace" font-size="9" fill="#e2d0ff" text-anchor="middle">Docker</text>
  <!-- Output nodes -->
  <rect x="650" y="100" width="80" height="40" rx="8" fill="#0d1b2e" stroke="#7c3aed50"/>
  <text x="690" y="125" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Elastic</text>
  <rect x="650" y="160" width="80" height="40" rx="8" fill="#0d1b2e" stroke="#7c3aed50"/>
  <text x="690" y="185" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Kibana</text>
  <rect x="650" y="205" width="80" height="40" rx="8" fill="#0d1b2e" stroke="#7c3aed50"/>
  <text x="690" y="230" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Policy DB</text>
  <rect x="650" y="250" width="80" height="40" rx="8" fill="#0d1b2e" stroke="#7c3aed50"/>
  <text x="690" y="275" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Claims</text>
  <rect x="650" y="310" width="80" height="40" rx="8" fill="#0d1b2e" stroke="#7c3aed50"/>
  <text x="690" y="335" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Monitor</text>
  <!-- Title -->
  <text x="40" y="35" font-family="monospace" font-size="18" fill="#a855f7" font-weight="bold">Insurance Data Orchestration</text>
  <text x="40" y="55" font-family="monospace" font-size="10" fill="#ffffff50">Microservices · Event-Driven · Docker Compose</text>
  <!-- Status -->
  <circle cx="46" cy="415" r="6" fill="#22c55e"/>
  <text x="60" y="420" font-family="monospace" font-size="11" fill="#22c55e">All services healthy</text>
</svg>
