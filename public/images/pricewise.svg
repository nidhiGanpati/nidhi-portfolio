<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#080b10"/>
  <!-- Phone mockup -->
  <rect x="270" y="20" width="260" height="410" rx="30" fill="#0d1520" stroke="#7c3aed" stroke-width="2"/>
  <rect x="340" y="32" width="120" height="12" rx="6" fill="#1a1a2e"/>
  <!-- App header -->
  <rect x="270" y="55" width="260" height="50" rx="0" fill="#0a1018"/>
  <text x="400" y="86" font-family="monospace" font-size="14" fill="#a855f7" text-anchor="middle" font-weight="bold">PriceWise</text>
  <!-- Search bar -->
  <rect x="290" y="118" width="220" height="32" rx="16" fill="#1a2030"/>
  <text x="400" y="139" font-family="monospace" font-size="10" fill="#ffffff40" text-anchor="middle">Search groceries...</text>
  <!-- Price cards -->
  <rect x="285" y="165" width="100" height="85" rx="10" fill="#0d1520" stroke="#7c3aed30"/>
  <text x="335" y="190" font-family="monospace" font-size="9" fill="#ffffff60" text-anchor="middle">Milk 1L</text>
  <text x="335" y="215" font-family="monospace" font-size="16" fill="#22c55e" text-anchor="middle" font-weight="bold">$1.49</text>
  <text x="335" y="230" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">Save 30%</text>
  <text x="335" y="242" font-family="monospace" font-size="8" fill="#ffffff40" text-anchor="middle">Walmart</text>
  <rect x="395" y="165" width="100" height="85" rx="10" fill="#0d1520" stroke="#7c3aed30"/>
  <text x="445" y="190" font-family="monospace" font-size="9" fill="#ffffff60" text-anchor="middle">Eggs 12pk</text>
  <text x="445" y="215" font-family="monospace" font-size="16" fill="#a855f7" text-anchor="middle" font-weight="bold">$3.29</text>
  <text x="445" y="230" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle">Best nearby</text>
  <text x="445" y="242" font-family="monospace" font-size="8" fill="#ffffff40" text-anchor="middle">Kroger</text>
  <!-- Budget bar -->
  <text x="290" y="272" font-family="monospace" font-size="10" fill="#ffffff60">Budget: $80 / $120</text>
  <rect x="290" y="278" width="220" height="10" rx="5" fill="#ffffff10"/>
  <rect x="290" y="278" width="147" height="10" rx="5" fill="#a855f7"/>
  <!-- AI suggestion -->
  <rect x="285" y="302" width="230" height="50" rx="10" fill="#7c3aed15" stroke="#7c3aed30"/>
  <text x="400" y="322" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">AI: Switch brands on bread</text>
  <text x="400" y="338" font-family="monospace" font-size="9" fill="#ffffff60" text-anchor="middle">Save $4.20 this week</text>
  <!-- Bottom nav -->
  <rect x="270" y="385" width="260" height="45" rx="0" fill="#0a1018"/>
  <text x="320" y="413" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Home</text>
  <text x="370" y="413" font-family="monospace" font-size="9" fill="#ffffff40" text-anchor="middle">Compare</text>
  <text x="430" y="413" font-family="monospace" font-size="9" fill="#ffffff40" text-anchor="middle">Cart</text>
  <text x="480" y="413" font-family="monospace" font-size="9" fill="#ffffff40" text-anchor="middle">Budget</text>
  <!-- Left label -->
  <text x="30" y="80" font-family="monospace" font-size="18" fill="#a855f7" font-weight="bold">PriceWise</text>
  <text x="30" y="100" font-family="monospace" font-size="10" fill="#ffffff50">Grocery Price</text>
  <text x="30" y="116" font-family="monospace" font-size="10" fill="#ffffff50">Comparison App</text>
  <text x="30" y="160" font-family="monospace" font-size="10" fill="#ffffff40">10+ Screens Designed</text>
  <text x="30" y="180" font-family="monospace" font-size="10" fill="#ffffff40">Figma · Moqups</text>
  <text x="30" y="200" font-family="monospace" font-size="10" fill="#ffffff40">UI/UX Prototype</text>
</svg>
