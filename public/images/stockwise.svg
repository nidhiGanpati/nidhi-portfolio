<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff08" stroke-width="1"/>
  <!-- Stock chart line -->
  <polyline points="50,350 120,300 200,320 280,240 360,260 440,180 520,200 600,140 680,160 750,100" fill="none" stroke="url(#line1)" stroke-width="3"/>
  <!-- Area fill -->
  <polygon points="50,350 120,300 200,320 280,240 360,260 440,180 520,200 600,140 680,160 750,100 750,430 50,430" fill="#7c3aed" fill-opacity="0.12"/>
  <!-- Candlesticks -->
  <rect x="100" y="290" width="14" height="40" rx="2" fill="#22c55e"/>
  <rect x="180" y="310" width="14" height="30" rx="2" fill="#ef4444"/>
  <rect x="260" y="235" width="14" height="35" rx="2" fill="#22c55e"/>
  <rect x="340" y="248" width="14" height="28" rx="2" fill="#22c55e"/>
  <rect x="420" y="172" width="14" height="38" rx="2" fill="#22c55e"/>
  <rect x="500" y="192" width="14" height="25" rx="2" fill="#ef4444"/>
  <rect x="580" y="133" width="14" height="30" rx="2" fill="#22c55e"/>
  <!-- Labels -->
  <text x="40" y="40" font-family="monospace" font-size="22" fill="#a855f7" font-weight="bold">StockWise</text>
  <text x="40" y="62" font-family="monospace" font-size="11" fill="#ffffff60">TRADING PLATFORM</text>
  <!-- Stats -->
  <rect x="550" y="20" width="120" height="36" rx="8" fill="#7c3aed20" stroke="#7c3aed40"/>
  <text x="610" y="35" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">PORTFOLIO</text>
  <text x="610" y="50" font-family="monospace" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="bold">+18.4%</text>
  <!-- Dot on chart -->
  <circle cx="750" cy="100" r="6" fill="#a855f7"/>
  <circle cx="750" cy="100" r="12" fill="#a855f7" fill-opacity="0.3"/>
</svg>
